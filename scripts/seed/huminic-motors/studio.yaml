# Huminic Motors — DEMO tenant config (cloned from serra-honda, rebranded).
# Demo profile: outbound is bounded to the visitor's own contact by the
# demo-comms-guard (DEMO_PROFILES). No VIN, no real dealer notifications.
branding:
  persona_name: Huminic Motors
  accent_color: "#0d9488"
menu:
  chat: true
  knowledge: true
  tools: true
  data: true
  comms: true
  campaigns: true
agent_picker:
  visible_agents:
    - caroline
    - crm-guru
    - semantic-guardian
  default_agent: caroline
tools_widget:
  show_embed_snippet: true
  show_live_demo: true
  consult: false
widgets:
  - slug: huminic-motors-sales-chat
    mode: chat
    agent: caroline
  - slug: huminic-motors-contact
    mode: form
    agent: caroline
autonomous_reply_defaults:
  enabled: true
  business_hours_only: false
  max_agent_turns: 3
# No VIN/databrain federation for the demo — keeps the VIN gate disengaged.
federation:
  read_scopes: []
lead_notifications:
  adf_email: ""
  sender_name: Huminic Motors new lead
  resend_token_var: CENTRAL_MCP_TOKEN
# Demo notifications go ONLY to the operator/rep — never a real dealership inbox.
notifications:
  lead_format: email
  lead_recipient: duane.wells@huminic.ai
  routing:
    - event: all
      to: duane.wells@huminic.ai
      channel: email
      label: Demo rep (Duane)
      enabled: true
  notify_cooldown_hours: 0
channel_credentials:
  sms: own
  vapi: own    # dial with the per-profile Anastasia assistant (not the shared one)
sms:
  inbound_domain: sales
  account: huminic_motors
unified_widget:
  enabled: true
  accent: "#0d9488"
  subtitle: Choose how to connect
  channels:
    chat: true
    callback: true
    form: true
    video: true
  chat_slug: huminic-motors-sales-chat
  form_slug: huminic-motors-contact
  video_persona_id: "p9d497a88cfd"   # Anastasia - Huminic Motors (Tavus)
  video_agent_name: Anastasia
comms:
  business_hours:
    tz: America/Chicago
    start: 08:00
    end: 21:00
  outbound_enabled: true
  channels:
    sms: true
    voice: true
    video: true
    email: true
  vin_check: false
  sms_consent_check: false
