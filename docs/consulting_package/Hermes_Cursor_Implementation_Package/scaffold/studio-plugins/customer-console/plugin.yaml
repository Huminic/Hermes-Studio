id: customer-console
version: 0.2.0
display_name: Customer Console
requires_studio_version: ">=1.20.0"

# Phase C 6-page IA: Chat / Knowledge / Tools / Data / Comms / Campaigns.
# Replaces the prior 4-page IA (Chat/Dashboard/Widget/Service) in plugin v0.1.0.
# Tools page hosts a Widget sub-page (customer-console.tools-widget) navigated
# inside the tools renderer; Campaigns page renders the Service-only sub-page
# inline per operator decision 2026-05-29.

routes:
  - path: /console/$profile/chat
    renderer: customer-console.chat
    profile_scoped: true
    auth: required
  - path: /console/$profile/knowledge
    renderer: customer-console.knowledge
    profile_scoped: true
    auth: required
  - path: /console/$profile/tools
    renderer: customer-console.tools
    profile_scoped: true
    auth: required
  - path: /console/$profile/data
    renderer: customer-console.data
    profile_scoped: true
    auth: required
  - path: /console/$profile/comms
    renderer: customer-console.comms
    profile_scoped: true
    auth: required
  - path: /console/$profile/campaigns
    renderer: customer-console.campaigns
    profile_scoped: true
    auth: required
  - path: /w/$slug
    renderer: customer-console.widget-public
    profile_scoped: false
    auth: public

right_pane_slots:
  - slot_id: console-assistant
    renderer: customer-console.assistant-pane
    applies_to_routes:
      - /console/$profile/chat
      - /console/$profile/knowledge
      - /console/$profile/tools
      - /console/$profile/data
      - /console/$profile/comms
      - /console/$profile/campaigns

hosted_bundles:
  - path: /customer-console/embed.js
    entry: src/embed/customer-console/widget-loader.ts
    cors: "*"
    cache_control: "public, max-age=300"
  - path: /customer-console/embed.css
    entry: src/embed/customer-console/widget-loader.css
    cors: "*"
    cache_control: "public, max-age=300"

studio_config_schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  type: object
  properties:
    branding:
      type: object
      properties:
        logo_path:
          type: string
        accent_color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        persona_name:
          type: string
      required:
        - persona_name
    menu:
      type: object
      properties:
        chat:
          type: boolean
          default: true
        knowledge:
          type: boolean
          default: true
        tools:
          type: boolean
          default: true
        data:
          type: boolean
          default: true
        comms:
          type: boolean
          default: true
        campaigns:
          type: boolean
          default: true
    agent_picker:
      type: object
      properties:
        visible_agents:
          type: array
          items:
            type: string
        default_agent:
          type: string
    tools_widget:
      type: object
      properties:
        show_embed_snippet:
          type: boolean
          default: true
        show_live_demo:
          type: boolean
          default: true
    widgets:
      type: array
      items:
        type: object
        properties:
          slug:
            type: string
          mode:
            type: string
            enum: [chat, voice, video, form]
          agent:
            type: string
        required:
          - slug
          - mode
          - agent
    autonomous_reply_defaults:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
        business_hours_only:
          type: boolean
          default: false
        max_agent_turns:
          type: integer
          minimum: 0
          default: 3
        channels:
          type: array
          items:
            type: string
            enum: [chat, email, sms, phone, video]
    federation:
      type: object
      properties:
        read_scopes:
          type: array
          items:
            type: string
  required:
    - branding

skill_dependencies:
  - web-artifact
  - live-web-artifact

mcp_dependencies: []
